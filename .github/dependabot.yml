version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:20"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    groups:
      # Batch all minor/patch into one PR; majors stay individual for review
      python-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "python"

    # --- Hold back specific deps when needed ---
    # ignore:
    #   - dependency-name: "numpy"
    #     update-types: ["version-update:semver-major"]
    #   - dependency-name: "some-package"
    #     versions: ["2.x"]

    # --- Delay updates to dodge bad releases ---
    # cooldown:
    #   default-days: 7
    #   semver-major-days: 14
    #   semver-minor-days: 7
    #   semver-patch-days: 3

  # --- Rust helper ---
  # IMPORTANT: point `directory` at wherever your Cargo.toml actually lives
  - package-ecosystem: "cargo"
    directory: "/rust"          # e.g. "/", "/src/native", "/crates/helper"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(rust)"
      include: "scope"
    groups:
      rust-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "rust"

  # --- GitHub Actions (drop if you have no workflows) ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
