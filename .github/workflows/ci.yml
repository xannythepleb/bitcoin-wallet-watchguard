name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --locked --all-extras
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: derivation-helper
    steps:
      - uses: actions/checkout@v6
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --release -- -D warnings
      - name: Build
        run: cargo build --release

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64        # single-arch for PR speed
          push: false
          load: true
          tags: wallet-watchguard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max