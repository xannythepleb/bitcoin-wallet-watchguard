name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync --locked --all-extras
      - name: Lint
        run: uv run ruff check .
        continue-on-error: true
      - name: Format check
        run: uv run ruff format --check .
        continue-on-error: true
      - name: Test
        run: uv run pytest

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: derivation-helper
    steps:
      - uses: actions/checkout@v7
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --release
      - name: Build
        run: cargo build --release

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: wallet-watchguard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wallet-watchguard:ci
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          hide-progress: true
          format: table
          exit-code: "1"        # fail the PR on a fixable CRITICAL/HIGH