name: Build and publish Docker image

"on":
  release:
    types: [published]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Build and publish
    runs-on: ubuntu-latest

    if: ${{ startsWith(github.event.release.tag_name, 'v') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set lowercase image name
        id: image
        shell: bash
        run: |
          image_name="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME=${image_name}" >> "${GITHUB_ENV}"
          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image_name }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Bitcoin Wallet Watchguard: Talk to your Bitcoin node via Electrum and Ntfy

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Scan pushed Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image_name }}:${{ github.event.release.tag_name }}
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          hide-progress: true
          format: sarif
          output: trivy-image-results.sarif
          exit-code: "0"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy image results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-image-results.sarif') != '' }}
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image
