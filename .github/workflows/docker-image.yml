name: Build and publish Docker image

"on":
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, e.g. v0.2.0"
        required: true
        type: string

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:

  verify-lock:
    runs-on: ubuntu-latest
    if: ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) || (github.event_name == 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.1.0
      - run: uv lock --check   # fails if uv.lock is out of sync with pyproject.toml

  docker:
    name: Build and publish
    runs-on: ubuntu-latest
    needs: verify-lock

    if: ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'v')) || (github.event_name == 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
            prerelease="${{ github.event.release.prerelease }}"
          else
            version="${{ inputs.version }}"
            prerelease="false"

            if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Manual release version must use stable vX.Y.Z format, for example v0.2.0"
              exit 1
            fi
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

          echo "Docker release version: ${version}"
          echo "Prerelease: ${prerelease}"

      - name: Verify release tag is on default branch
        if: ${{ github.event_name == 'release' }}
        shell: bash
        run: |
          set -euo pipefail

          default_branch="${{ github.event.repository.default_branch }}"
          tag="${{ steps.version.outputs.version }}"

          git fetch --force origin "refs/heads/${default_branch}:refs/remotes/origin/${default_branch}"
          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"

          tag_commit="$(git rev-list -n 1 "refs/tags/${tag}")"

          echo "Default branch: ${default_branch}"
          echo "Release tag: ${tag}"
          echo "Release tag commit: ${tag_commit}"

          if ! git merge-base --is-ancestor "${tag_commit}" "refs/remotes/origin/${default_branch}"; then
            echo "::error::Release tag ${tag} is not contained in ${default_branch}. Refusing to publish Docker release image."
            exit 1
          fi

      - name: Set lowercase image name
        id: image
        shell: bash
        run: |
          image_name="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          echo "IMAGE_NAME=${image_name}" >> "${GITHUB_ENV}"
          echo "image_name=${image_name}" >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image_name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ steps.version.outputs.prerelease == 'false' }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title="Bitcoin Wallet Watchguard"
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description="Bitcoin Wallet Watchguard: Talk to your Bitcoin node via Electrum and Ntfy"

      - name: Generate slim Docker image metadata
        id: meta_slim
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.image_name }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=slim,enable=${{ steps.version.outputs.prerelease == 'false' }}
            type=raw,value=${{ steps.version.outputs.version }},suffix=-slim
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }},suffix=-slim
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }},suffix=-slim
            type=sha,prefix=sha-,suffix=-slim
          labels: |
            org.opencontainers.image.title="Bitcoin Wallet Watchguard"
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description="Bitcoin Wallet Watchguard: Talk to your Bitcoin node via Electrum and Ntfy"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: ./Dockerfile
          target: runtime-tor
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          no-cache: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Healthcheck pushed Docker image
        shell: bash
        run: |
          docker run --rm "${{ steps.image.outputs.image_name }}:${{ steps.version.outputs.version }}" sh -c '
            cat > /app/data/config.yaml <<EOF
          app:
            database_path: /app/data/watchguard.sqlite3
            derivation_helper_path: /app/wwg-derive
          EOF
            wwg healthcheck --config /app/data/config.yaml --verbose
          '

      - name: Build and push slim Docker image
        uses: docker/build-push-action@v7
        id: build_slim
        with:
          context: .
          file: ./Dockerfile
          target: runtime-slim
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          no-cache: true
          tags: ${{ steps.meta_slim.outputs.tags }}
          labels: ${{ steps.meta_slim.outputs.labels }}
          provenance: true
          sbom: true

      - name: Healthcheck pushed slim Docker image
        shell: bash
        run: |
          docker run --rm "${{ steps.image.outputs.image_name }}:${{ steps.version.outputs.version }}-slim" sh -c '
            cat > /app/data/config.yaml <<EOF
          app:
            database_path: /app/data/watchguard.sqlite3
            derivation_helper_path: /app/wwg-derive
          EOF
            wwg healthcheck --config /app/data/config.yaml --verbose
          '

      - name: Scan pushed Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image_name }}:${{ steps.version.outputs.version }}
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          hide-progress: true
          format: sarif
          output: trivy-image-results.sarif
          exit-code: "0"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan pushed slim Docker image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.image_name }}:${{ steps.version.outputs.version }}-slim
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          hide-progress: true
          format: sarif
          output: trivy-slim-image-results.sarif
          exit-code: "0"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve default branch SHA
        id: default_branch
        shell: bash
        run: |
          branch="${{ github.event.repository.default_branch }}"
          sha="$(git ls-remote origin "refs/heads/${branch}" | cut -f1)"

          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"
          echo "sha=${sha}" >> "${GITHUB_OUTPUT}"

          echo "Default branch: ${branch}"
          echo "Default branch SHA: ${sha}"
          echo "Release SHA: ${{ github.sha }}"

      - name: Upload Trivy image results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-image-results.sarif') != '' }}
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image
          ref: refs/heads/${{ steps.default_branch.outputs.branch }}
          sha: ${{ steps.default_branch.outputs.sha }}

      - name: Upload Trivy slim image results to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ always() && hashFiles('trivy-slim-image-results.sarif') != '' }}
        with:
          sarif_file: trivy-slim-image-results.sarif
          category: trivy-slim-image
          ref: refs/heads/${{ steps.default_branch.outputs.branch }}
          sha: ${{ steps.default_branch.outputs.sha }}