name: Cleanup old GHCR images

on:
  workflow_dispatch:
    inputs:
      cutoff_hours:
        description: "Delete package versions older than this many hours"
        required: true
        default: "2"
      dry_run:
        description: "Only print what would be deleted"
        required: true
        type: boolean
        default: true
      package_name:
        description: "GHCR package/image name. Usually the repository name."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  cleanup:
    name: Delete old GHCR package versions
    runs-on: ubuntu-latest

    steps:
      - name: Delete GHCR versions older than cutoff
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          OWNER_TYPE: ${{ github.event.repository.owner.type }}
          REPO_NAME: ${{ github.event.repository.name }}
          PACKAGE_NAME_INPUT: ${{ inputs.package_name }}
          CUTOFF_HOURS: ${{ inputs.cutoff_hours }}
          DRY_RUN: ${{ inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail

          if ! [[ "$CUTOFF_HOURS" =~ ^[0-9]+$ ]]; then
            echo "cutoff_hours must be a positive integer"
            exit 1
          fi

          # GHCR package name is usually just the image name, not owner/image.
          # For ghcr.io/OWNER/REPO, the package name is normally REPO.
          PACKAGE_NAME="${PACKAGE_NAME_INPUT:-$REPO_NAME}"

          # Match the lower-case image name created by workflows using:
          # ghcr.io/${GITHUB_REPOSITORY,,}
          PACKAGE_NAME="$(echo "$PACKAGE_NAME" | tr '[:upper:]' '[:lower:]')"

          # URL-encode package names, just in case.
          PACKAGE_NAME_ENCODED="$(jq -rn --arg x "$PACKAGE_NAME" '$x|@uri')"

          if [[ "$OWNER_TYPE" == "Organization" ]]; then
            API_PATH="/orgs/${OWNER}/packages/container/${PACKAGE_NAME_ENCODED}/versions"
          else
            API_PATH="/users/${OWNER}/packages/container/${PACKAGE_NAME_ENCODED}/versions"
          fi

          CUTOFF_EPOCH="$(date -u -d "${CUTOFF_HOURS} hours ago" +%s)"

          echo "Owner:        $OWNER"
          echo "Owner type:   $OWNER_TYPE"
          echo "Package:      $PACKAGE_NAME"
          echo "API path:     $API_PATH"
          echo "Cutoff:       versions created before $(date -u -d "@$CUTOFF_EPOCH" --iso-8601=seconds)"
          echo "Dry run:      $DRY_RUN"
          echo

          versions_json="$(gh api --paginate "$API_PATH?per_page=100" --slurp)"

          echo "$versions_json" | jq -c '.[][]' | while read -r version; do
            id="$(jq -r '.id' <<< "$version")"
            created_at="$(jq -r '.created_at' <<< "$version")"
            tags="$(jq -r '[.metadata.container.tags[]?] | join(", ")' <<< "$version")"

            created_epoch="$(date -u -d "$created_at" +%s)"

            if (( created_epoch >= CUTOFF_EPOCH )); then
              echo "KEEP   id=$id created_at=$created_at tags=[$tags]"
              continue
            fi

            if [[ "$DRY_RUN" == "true" ]]; then
              echo "WOULD DELETE id=$id created_at=$created_at tags=[$tags]"
            else
              echo "DELETE id=$id created_at=$created_at tags=[$tags]"
              gh api \
                --method DELETE \
                "$API_PATH/$id"
            fi
          done