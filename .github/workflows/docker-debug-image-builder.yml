name: Build Docker image for test branch

on:
  push:
    branches:
      - "debug/**"
  workflow_dispatch:

concurrency:
  group: docker-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Build test Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set lowercase image name
        shell: bash
        run: |
          echo "IMAGE_NAME=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "${GITHUB_ENV}"

      - name: Set safe test tag
        id: test_tag
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          safe_branch="$(printf '%s' "${branch}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"

          echo "safe_branch=${safe_branch}" >> "${GITHUB_OUTPUT}"
          echo "Using test image tag suffix: ${safe_branch}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=test-${{ steps.test_tag.outputs.safe_branch }}
            type=sha,prefix=test-${{ steps.test_tag.outputs.safe_branch }}-sha-

      - name: Generate slim Docker image metadata
        id: meta_slim
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=test-${{ steps.test_tag.outputs.safe_branch }}-slim
            type=sha,prefix=test-${{ steps.test_tag.outputs.safe_branch }}-slim-sha-

      - name: Build full image locally for non-root verification
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-tor
          platforms: linux/amd64
          push: false
          load: true
          tags: wwg-full:nonroot-test

      - name: Build slim image locally for non-root verification
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-slim
          platforms: linux/amd64
          push: false
          load: true
          tags: wwg-slim:nonroot-test

      - name: Verify images do not run as root
        shell: bash
        run: |
          set -euo pipefail

          for image in wwg-full:nonroot-test wwg-slim:nonroot-test; do
            echo "Checking ${image}"

            configured_user="$(docker image inspect "$image" --format '{{.Config.User}}')"
            test "$configured_user" = "wwg"

            configured_cmd="$(docker image inspect "$image" --format '{{json .Config.Cmd}}')"
            test "$configured_cmd" = '["wwg","run"]'

            docker run --rm --entrypoint sh "$image" -c '
              test "$(id -u)" != "0"
              test "$(id -un)" = "wwg"
              command -v wwg >/dev/null
              test -x /app/wwg-derive
            '
          done

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-tor
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push slim Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-slim
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta_slim.outputs.tags }}
          labels: ${{ steps.meta_slim.outputs.labels }}