name: Build Docker image for test branch

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: docker-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  docker:
    name: Build test Docker image
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == vars.DOCKER_TEST_BRANCH }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set lowercase image name
        shell: bash
        run: |
          echo "IMAGE_NAME=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "${GITHUB_ENV}"

      - name: Set safe test tag
        id: test_tag
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME}"
          safe_branch="$(printf '%s' "${branch}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//')"

          echo "safe_branch=${safe_branch}" >> "${GITHUB_OUTPUT}"
          echo "Using test image tag suffix: ${safe_branch}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=test-${{ steps.test_tag.outputs.safe_branch }}
            type=sha,prefix=test-${{ steps.test_tag.outputs.safe_branch }}-sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}