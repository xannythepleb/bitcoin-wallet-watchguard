app:
  name: "Bitcoin Wallet Watchguard"
  # Don't touch this unless you know what you are doing
  database_path: "./data/watchguard.sqlite3"
  # Same with this
  derivation_helper_path: "/usr/local/bin/wwg-derive"
  lookahead: 100
  notify_on_mempool: true
  notify_on_confirmed: true

# Strongly recommended: use your own Bitcoin node + Fulcrum.
#
# For Start9/StartOS, local LAN URLs and local service URLs often use
# self-signed TLS certificates. In that case, keep tls: true but set
# tls_verify: false.
#
# For onion hosts, either run the whole container through Tor/network routing,
# or set socks_proxy, e.g. "127.0.0.1:9050".
electrum:
  host: "192.168.1.50"
  port: 50002
  tls: true
  tls_verify: false
  socks_proxy: null
  timeout_seconds: 30

# Strongly recommended: use a self-hosted ntfy instance and a random private topic.
#
# For normal Start9/StartOS notifications:
#   1. Open the ntfy service UI.
#   2. Use "Provision Publisher".
#   3. Enter a reference name, e.g. "wallet-watchguard".
#   4. Enter the topic name shown or generated by Wallet Watchguard.
#   5. Start9 will show publishUrl, token, topic and username.
#   6. Paste those values into: wwg init --add ntfy
#
# For Conversation Mode on Start9/StartOS, Provision Publisher is not enough
# because it creates a write-only token. Create a regular ntfy user, grant it
# read-write access to the topic, log in as that user, create an access token,
# then configure Wallet Watchguard with that token.
ntfy:
  server: "https://ntfy.example.com"
  topic: "wallet-watchguard-replace-me"
  auth:
    # none/token/basic
    #
    # Keep this as "none" in the example file.
    # Use the setup wizard to write encrypted token/basic credentials.
    type: "none"

  priority: "high"
  tags: "bitcoin"

  # Set to false for Start9/StartOS or local ntfy services that use
  # self-signed TLS certificates.
  tls_verify: true
  timeout_seconds: 15

# Optional: enrich notifications with decoded transaction details, fee,
# vsize and fee rate from a local Mempool instance.
#
# Also allows you to query your local Mempool instance in Conversation Mode.
# For example try: wwg fees
#
# Fulcrum/Electrum remains the wallet activity source of truth.
#
# For Start9/StartOS local Mempool URLs using self-signed TLS certificates,
# set tls_verify: false.
mempool:
  enabled: false
  base_url: ""
  tls_verify: true
  timeout_seconds: 15
  enrich_notifications: true

# Optional: Conversation Mode (remote control) via Ntfy.
#
# This is OFF by default. If enabled, Wallet Watchguard will only start
# conversation mode if the ntfy topic passes runtime protection checks:
#   - configured token/basic credentials can read the topic
#   - configured token/basic credentials can publish to the topic
#   - anonymous read is denied
#   - anonymous write is denied
#
# Leave topic blank to reuse ntfy.topic. Set a topic to keep Conversation Mode
# commands and replies separate from normal wallet alerts.
#
# auth.type values:
#   same_as_ntfy - reuse ntfy.auth; only safe if that credential has read-write access
#   token        - store a separate encrypted access token for Conversation Mode
#   basic        - store separate encrypted username/password credentials
#
# HIGHLY recommend ONLY using this with your own node and self-hosted Ntfy instance.
conversation:
  enabled: false
  topic: ""
  auth:
    type: "same_as_ntfy"
  command_prefix: "wwg"
  require_protected_topic: true
  probe_anonymous_write: true
  max_addresses_per_response: 10
  max_response_chars: 3900

# Optional: internal Tor upstream for Docker/Docker Compose builds.
#
# This is OFF by default. Enable it if electrum.host is a .onion address and
# you want Wallet Watchguard to start its own Tor SOCKS proxy inside the
# container. You can also enable it only for one run with:
#   wwg run --tor-upstream
# or in Docker Compose with:
#   WWG_TOR_UPSTREAM=true docker compose up -d
#
# When enabled, Wallet Watchguard automatically uses tor.socks_proxy as the
# Electrum/Fulcrum SOCKS proxy and runs a Tor connectivity probe on startup.
tor:
  enabled: false
  socks_proxy: "127.0.0.1:9050"
  manage_process: true
  startup_timeout_seconds: 60
  test_on_startup: true
  data_dir: ""

# Wallet entries are intentionally not shown as fake encrypted blobs here.
#
# Add an encrypted wallet with:
#   wwg init --add wallet
#
# The wizard will write entries like:
#
#   - name: "Main Taproot wallet"
#     network: "bitcoin"
#     wallet_type: "taproot"
#     account_path: "m/86'/0'/0'"
#     xpub_encryption:
#       scheme: "pynacl-secretbox-argon2id-v1"
#       kdf: "argon2id"
#       opslimit: 3
#       memlimit: 268435456
#       salt: "..."
#     encrypted_xpub: "..."
#     receive_path_template: "0/*"
#     change_path_template: "1/*"
#     lookahead: 100
wallets: []