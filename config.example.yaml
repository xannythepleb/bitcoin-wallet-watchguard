app:
  name: "Bitcoin Wallet Watchguard"
  database_path: "/data/watchguard.sqlite3"
  derivation_helper_path: "/usr/local/bin/wwg-derive"
  lookahead: 100
  notify_on_mempool: true
  notify_on_confirmed: true

# Strongly recommended: use your own Bitcoin node + Fulcrum.
#
# For Start9/StartOS, local LAN URLs and local service URLs often use
# self-signed TLS certificates. In that case, keep tls: true but set
# tls_verify: false.
#
# For onion hosts, either run the whole container through Tor/network routing,
# or set socks_proxy, e.g. "127.0.0.1:9050".
electrum:
  host: "192.168.1.50"
  port: 50002
  tls: true
  tls_verify: false
  socks_proxy: null
  timeout_seconds: 30

# Strongly recommended: use a self-hosted ntfy instance and a random private topic.
#
# The setup wizard writes encrypted ntfy auth fields for you.
#
# For Start9/StartOS:
#   1. Open the ntfy service UI.
#   2. Use "Provision Publisher".
#   3. Enter a reference name, e.g. "wallet-watchguard".
#   4. Enter the topic name shown or generated by Wallet Watchguard.
#   5. Start9 will show:
#        - publishUrl
#        - token
#        - topic
#        - username
#   6. Paste those values into:
#        wwg init --config /data/config.yaml --add ntfy
#
# Wallet Watchguard will encrypt the token using the same passphrase as your xpub.
ntfy:
  server: "https://ntfy.example.com"
  topic: "wallet-watchguard-replace-me"
  auth:
    # none/token/basic
    #
    # Keep this as "none" in the example file.
    # Use the setup wizard to write encrypted token/basic credentials.
    type: "none"

  priority: "high"
  tags: "bitcoin,watch"

  # Set to false for Start9/StartOS or local ntfy services that use
  # self-signed TLS certificates.
  tls_verify: true
  timeout_seconds: 15

# Optional: enrich notifications with decoded transaction details, fee,
# vsize and fee rate from a local Mempool instance.
#
# Fulcrum/Electrum remains the wallet activity source of truth.
#
# For Start9/StartOS local Mempool URLs using self-signed TLS certificates,
# set tls_verify: false.
mempool:
  enabled: false
  base_url: ""
  tls_verify: true
  timeout_seconds: 15
  enrich_notifications: true

# Wallet entries are intentionally not shown as fake encrypted blobs here.
#
# Add an encrypted wallet with:
#   wwg init --config /data/config.yaml --add wallet
#
# The wizard will write entries like:
#
#   - name: "Main Taproot wallet"
#     network: "bitcoin"
#     wallet_type: "taproot"
#     account_path: "m/86'/0'/0'"
#     xpub_encryption:
#       scheme: "pynacl-secretbox-argon2id-v1"
#       kdf: "argon2id"
#       opslimit: 3
#       memlimit: 268435456
#       salt: "..."
#     encrypted_xpub: "..."
#     receive_path_template: "0/*"
#     change_path_template: "1/*"
#     lookahead: 100
wallets: []